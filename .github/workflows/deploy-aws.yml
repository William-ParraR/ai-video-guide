name: Deploy to AWS S3 + CloudFront

# ⚠️ SETUP REQUIRED before this workflow can run:
# 1. Create an S3 bucket with static website hosting enabled
# 2. Create a CloudFront distribution pointing to the S3 bucket
# 3. Add these GitHub Secrets (Settings → Secrets and variables → Actions):
#    - AWS_ACCESS_KEY_ID
#    - AWS_SECRET_ACCESS_KEY
#    - AWS_REGION (e.g., us-east-1)
#    - S3_BUCKET_NAME (your bucket name)
#    - CLOUDFRONT_DISTRIBUTION_ID (your distribution ID)

on:
  workflow_dispatch:  # Manual trigger only until AWS is configured
  # Uncomment to auto-deploy on push to main:
  # push:
  #   branches: [main]

jobs:
  deploy-aws:
    runs-on: ubuntu-latest
    name: Build & Deploy to AWS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (for AWS - no base path)
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BASE_URL: "/"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "*.html"
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment complete
        run: echo "✅ Deployed to AWS S3 + CloudFront successfully!"
